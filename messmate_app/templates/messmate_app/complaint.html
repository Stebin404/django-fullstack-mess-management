{% extends 'messmate_app/base.html' %}
{% load static %}

{% block title %}Submit Complaint{% endblock %}
{% block container_class %}no-card{% endblock %}

{% block content %}

<style>
    .complaint-wrapper {
        width: 90%;
        max-width: 700px;
        margin: 20px auto;
        background: #ffffff;
        padding: 35px 40px;
        border-radius: 20px;
        border: 1px solid #ffd4a8;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.07);
        text-align: center;
    }

    .complaint-title {
        font-size: 30px;
        font-weight: 800;
        color: #d35400;
        margin-bottom: 25px;
        display: flex;
        justify-content: center;
        gap: 10px;
        align-items: center;
    }

    label {
        font-weight: 600;
        color: #444;
        font-size: 17px;
        display: block;
        text-align: left;
        margin-bottom: 8px;
    }

    textarea {
        width: 100%;
        height: 180px;
        border: 1px solid #ffbd8f;
        background: #fffaf5;
        padding: 15px;
        border-radius: 12px;
        font-size: 16px;
        resize: none;
        transition: 0.25s;
    }

    textarea:focus {
        border-color: #ff7b00;
        background: #fff3e6;
        outline: none;
    }

    .submit-btn {
        margin-top: 20px;
        width: 100%;
        padding: 14px;
        background: linear-gradient(135deg, #ff9933, #ff6600);
        color: white;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.25s;
    }

    .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(255, 102, 0, 0.35);
    }
</style>

<div class="complaint-wrapper">

    <h2 class="complaint-title"> Submit a Complaint</h2>

    <form method="POST" onsubmit="return validateComplaint()">
        {% csrf_token %}

        <label for="complaint_text">Your Complaint:</label>
        <textarea name="complaint_text" id="complaint_text" placeholder="Describe your issue clearly..."></textarea>

        <button type="submit" class="submit-btn">Submit Complaint</button>
    </form>

</div>

<script>
function validateComplaint() {
    let text = document.getElementById("complaint_text").value.trim();

    if (!text) {
        alert("Complaint cannot be empty.");
        return false;
    }
    if (text.length < 10) {
        alert("Complaint must be at least 10 characters long.");
        return false;
    }
    return true;
}
</script>

{% endblock %}
